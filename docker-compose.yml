version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: forge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # After first start, pull a model:  docker exec -it forge-ollama ollama pull llama3

  backend:
    build: ./backend
    container_name: forge-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - CHROMA_DIR=/app/data/chroma
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - ENABLE_WEB_SEARCH=true
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80
    volumes:
      - chroma_data:/app/data/chroma
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    container_name: forge-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ollama_data:
  chroma_data:
